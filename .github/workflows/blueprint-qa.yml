# Deploys the Retail Agentic Commerce stack via Docker Compose, waits for it to
# become healthy, then runs the UI E2E test suite from the shared QA test image.
#
# Required repository secrets:
#   NGC_API_KEY            NVIDIA API key used to pull images and populate
#                          NVIDIA_API_KEY in .env.
#   BLUEPRINT_GITHUB_TEST  NVIDIA API key with pull access to
#                          nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image.
#                          If unset, the test step is skipped.
#
# Optional SMTP secrets (mail step skipped if any are missing):
#   SMTP_USERNAME, SMTP_PASSWORD, SMTP_MAIL_TO, SMTP_MAIL_FROM

name: Blueprint QA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retail-agentic-commerce-ui:
    name: Retail Agentic Commerce UI E2E
    runs-on: arc-runners-org-nvidia-ai-bp-2-gpu
    timeout-minutes: 480
    env:
      NVIDIA_API_KEY: ${{ secrets.NGC_API_KEY }}
      NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
      QA_TEST_IMAGE: nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image:latest
      UI_URL: http://localhost
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Print initial container status
        run: docker ps -a

      - name: Prepare .env and log in to NGC
        run: |
          set -euo pipefail

          if [ -z "${NGC_API_KEY:-}" ]; then
            echo "::error::Repository secret NGC_API_KEY is not set."
            exit 1
          fi

          cp env.example .env
          python3 - <<'PY'
          import os
          from pathlib import Path

          env_path = Path(".env")
          key = os.environ["NVIDIA_API_KEY"]
          lines = [
              f"NVIDIA_API_KEY={key}" if line.startswith("NVIDIA_API_KEY=") else line
              for line in env_path.read_text().splitlines()
          ]
          env_path.write_text("\n".join(lines) + "\n")
          PY

          echo "${NGC_API_KEY}" | docker login nvcr.io --username '$oauthtoken' --password-stdin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build Apps SDK widget
        run: |
          cd src/apps_sdk/web
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Deploy stack and wait for health
        run: |
          set -euo pipefail

          docker network create acp-infra-network || true

          for attempt in 1 2 3 4 5; do
            if docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d --build; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::docker compose up --build failed after 5 attempts"
              exit 1
            fi
            echo "docker compose attempt ${attempt} failed; cleaning up and retrying..."
            docker compose -f docker-compose.infra.yml -f docker-compose.yml down 2>/dev/null || true
            sleep $((attempt * 15))
          done

          wait_for_url() {
            local url="$1" attempts="$2" label="$3"
            local i=0
            until curl -fsS "${url}" > /dev/null 2>&1; do
              i=$((i + 1))
              if [ "${i}" -ge "${attempts}" ]; then
                echo "::error::${label} did not become ready after ${attempts} attempts (${url})"
                docker compose -f docker-compose.infra.yml -f docker-compose.yml ps
                exit 1
              fi
              echo "Waiting for ${label}... (${i}/${attempts})"
              sleep 10
            done
            echo "${label} is ready at ${url}"
          }

          wait_for_url "${UI_URL}/"              120 "UI"
          wait_for_url "${UI_URL}/api/health"      60 "Merchant API"
          wait_for_url "${UI_URL}/psp/health"      30 "PSP"
          wait_for_url "${UI_URL}/apps-sdk/health"  30 "Apps SDK"

      - name: Run UI automation tests
        if: always()
        env:
          BLUEPRINT_GITHUB_TEST: ${{ secrets.BLUEPRINT_GITHUB_TEST }}
        run: |
          set -euo pipefail

          if [ -z "${BLUEPRINT_GITHUB_TEST:-}" ]; then
            echo "Skipping tests: repository secret BLUEPRINT_GITHUB_TEST is not set."
            exit 0
          fi

          echo "${BLUEPRINT_GITHUB_TEST}" | docker login nvcr.io --username '$oauthtoken' --password-stdin

          echo "Waiting for services to stabilize (2 minutes)..."
          sleep 120

          echo "Confirming UI is still reachable at ${UI_URL}..."
          for i in $(seq 1 30); do
            if curl -fsS "${UI_URL}/" > /dev/null 2>&1; then
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "::error::UI unreachable after stabilization wait"
              exit 1
            fi
            echo "Retry ${i}/30..."
            sleep 10
          done

          echo "Pulling QA test image: ${QA_TEST_IMAGE}"
          docker pull "${QA_TEST_IMAGE}"

          docker run --rm \
            --net=host \
            -v "$(pwd):/workspace" \
            "${QA_TEST_IMAGE}" \
            pytest -m retail_agentic_commerce \
              --retail-agentic-commerce-url="${UI_URL}" \
              --disable-warnings -v --timeout=240 \
              --html=/workspace/retail-agentic-commerce-ui-test.html \
              --self-contained-html

      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retail-agentic-commerce-ui-test
          path: retail-agentic-commerce-ui-test.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup Docker resources
        if: always()
        run: |
          set +e

          echo "Stopping Docker Compose services..."
          docker compose -f docker-compose.infra.yml -f docker-compose.yml down --rmi all 2>/dev/null || true

          sleep 30

          echo "Removing QA test image..."
          docker rmi "${QA_TEST_IMAGE}" 2>/dev/null || true

          echo "Pruning dangling images..."
          docker image prune -f

          echo "Remaining containers:"
          docker ps -a
          echo "Remaining images:"
          docker images

      - name: Compute job result
        id: set_result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "RESULT=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "RESULT=FAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect SMTP configuration
        id: smtp_notify
        if: always()
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_MAIL_TO: ${{ secrets.SMTP_MAIL_TO }}
          SMTP_MAIL_FROM: ${{ secrets.SMTP_MAIL_FROM }}
        run: |
          if [ -n "${SMTP_USERNAME:-}" ] \
             && [ -n "${SMTP_PASSWORD:-}" ] \
             && [ -n "${SMTP_MAIL_TO:-}" ] \
             && [ -n "${SMTP_MAIL_FROM:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send mail
        uses: dawidd6/action-send-mail@6e71c855c9a091d80a519621b9fd3e8d252ca40c
        if: always()
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "QA Test Workflow Result for ${{ github.repository }}"
          to: Github-Action-Blueprint-QA@nvidia.com
          from: github-workflow-notification@gmail.com
          html_body: |
            <p>Hello,</p>

            <p>The workflow for repository: <strong>${{ github.repository }}</strong> has completed.<br>
            <strong>Result:</strong> ${{ steps.set_result.outputs.RESULT }}</p>

            <p>You can review the details on GitHub:<br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</a></p>

            <p>Thanks!</p>
