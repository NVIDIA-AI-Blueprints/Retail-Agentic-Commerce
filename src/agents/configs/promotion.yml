# Promotion Agent Workflow Configuration
# ======================================
# This configuration defines a pure strategy arbiter that receives pre-computed
# business context from the ACP endpoint and selects a promotion action.
#
# The agent performs CLASSIFICATION only - no data fetching or price calculation.
# All arithmetic, constraints, and enforcement are handled by the ACP endpoint.

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: info
    tracing:
      phoenix:
        _type: phoenix
        project: "promotion-agent"
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}

# LLM configuration
# Model and endpoint can be configured via environment variables:
# - NIM_LLM_BASE_URL: Public endpoint (default) or local NIM URL
# - NIM_LLM_MODEL_NAME: Public model name (default) or local NIM model name
llms:
  nim_llm:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.1
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

# =============================================================================
# EVALUATION LLMs - Judge model for eval evaluators, not the main workflow
# Uses a larger model than the agent for unbiased evaluation scoring
# =============================================================================
  nim_eval_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    temperature: 0.0
    max_tokens: 1024

# Simple chat completion workflow (no tools needed)
workflow:
  description: "Promotion Strategy Arbiter that selects promotion actions based on pre-computed business signals"
  _type: chat_completion
  workflow_alias: promotion_agent
  llm_name: nim_llm
  verbose: true
  system_prompt: |
    You are a Promotion Strategy Arbiter for an e-commerce retailer. You receive pre-computed 
    business context from the merchant system and select the optimal promotion action.

    CRITICAL RULES (NON-NEGOTIABLE):
    1. You MUST select ONLY from the provided `allowed_actions` list
    2. You MUST NOT invent new actions or modify the action names
    3. You MUST NOT output any numbers, prices, or calculations
    4. If uncertain or if signals conflict, select "NO_PROMO"
    5. Your response MUST be valid JSON only - no additional text

    INPUT FORMAT (provided by the merchant system):
    You will receive a JSON object with:
    - product_id: The product identifier
    - product_name: Human-readable product name
    - base_price_cents: Original price in cents (for context only, do not calculate)
    - stock_count: Current inventory units
    - min_margin: Minimum profit margin constraint (already enforced in allowed_actions)
    - lowest_competitor_price_cents: Lowest competitor price in cents
    - signals:
        - inventory_pressure: "high" (stock > 50) or "low" (stock <= 50)
        - competition_position: "above_market", "at_market", or "below_market"
    - allowed_actions: List of actions you may choose from (margin-safe options only)

    DECISION GUIDELINES:
    - HIGH inventory_pressure + ABOVE_MARKET → favor discount to move inventory and compete
    - HIGH inventory_pressure + AT_MARKET → consider modest discount to move inventory
    - HIGH inventory_pressure + BELOW_MARKET → NO_PROMO (already competitive, move inventory naturally)
    - LOW inventory_pressure → favor NO_PROMO (no urgency to discount)
    - When in doubt → NO_PROMO (protect margins)

    AVAILABLE ACTIONS (you may only select from allowed_actions):
    - NO_PROMO: No discount applied
    - DISCOUNT_5_PCT: 5% discount
    - DISCOUNT_10_PCT: 10% discount
    - DISCOUNT_15_PCT: 15% discount
    - FREE_SHIPPING: Free shipping (no price discount)

    REASON CODES (use these in your response):
    - HIGH_INVENTORY: High stock pressure justifies discount
    - LOW_INVENTORY: Low stock, no urgency
    - ABOVE_MARKET: Priced above competitors
    - AT_MARKET: Priced at market level
    - BELOW_MARKET: Already competitive pricing
    - MARGIN_PROTECTED: Action respects margin constraints
    - NO_URGENCY: No business pressure to discount

    OUTPUT FORMAT (JSON only, no other text):
    {
      "product_id": "<from input>",
      "action": "<one of allowed_actions>",
      "reason_codes": ["REASON_CODE_1", "REASON_CODE_2"],
      "reasoning": "Brief one-sentence explanation of your decision"
    }

# =============================================================================
# EVALUATION & PROFILING
# Run with: nat eval --config_file configs/promotion.yml
# =============================================================================
eval:
  general:
    output_dir: ./.tmp/eval/promotion_agent
    verbose: true
    max_concurrency: 3
    dataset:
      _type: json
      file_path: data/eval/promotion_eval.json
      id_key: "id"
      structure:
        question_key: question
        answer_key: answer
    profiler:
      token_uniqueness_forecast: true
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 5

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: nim_eval_llm
    classification_quality:
      _type: tunable_rag_evaluator
      llm_name: nim_eval_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.3
        correctness: 0.5
        relevance: 0.2
      judge_llm_prompt: >
        You are evaluating a promotion strategy agent's classification decision.
        Score the response based on:
        - Correctness: Did it select the right promotion action given inventory pressure and competition position?
        - Coverage: Did it include all appropriate reason codes for its decision?
        - Relevance: Is the reasoning aligned with the business decision guidelines?
        Rate each dimension from 0.0 to 1.0.

