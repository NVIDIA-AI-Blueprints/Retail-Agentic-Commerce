# =============================================================================
# ARAG: Agentic Retrieval-Augmented Generation for Personalized Recommendation
# =============================================================================
#
# Workflow architecture:
#
#                           ┌──→ NLI Agent ─┐
#   User Query → RAG Retriever ──┤           ├──→ Context Summary Agent ─→ Item Ranker → Output Guard
#                           └──→ UUA Agent ─┘
#
# Parallel execution is retained for UUA and NLI (paper-aligned), while
# deterministic Python logic is limited to retrieval adaptation, concurrency
# orchestration, and output contract validation.
general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: info
    tracing:
      phoenix:
        _type: phoenix
        project: "arag-recommendations"
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}

llms:
  nim_llm:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.1
    max_tokens: 512
    chat_template_kwargs:
      enable_thinking: false
  nim_llm_nli:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.0
    max_tokens: 640
    chat_template_kwargs:
      enable_thinking: false

embedders:
  product_embedder:
    _type: nim
    base_url: ${NIM_EMBED_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_EMBED_MODEL_NAME:-nvidia/nv-embedqa-e5-v5}
    truncate: "END"

retrievers:
  product_retriever:
    _type: milvus_retriever
    uri: ${MILVUS_URI:-http://localhost:19530}
    collection_name: "product_catalog"
    embedding_model: product_embedder
    top_k: 10

functions:
  # -- Step 1: RAG retrieval setup ---------------------------------------------
  product_search:
    _type: nat_retriever
    retriever: product_retriever
    topic: Search product catalog for items matching the shopping context

  # Adapter that turns recommendation payload into retriever query + candidates
  rag_retriever:
    _type: rag_retriever
    retrieval_tool_name: product_search
    top_k: 6

  # -- Step 2a: NLI Agent (LLM) ------------------------------------------------
  nli_agent:
    _type: chat_completion
    llm_name: nim_llm_nli
    system_prompt: |
      You are the NLI alignment stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from rag_retriever with:
      - user_query
      - cart_items
      - session_context
      - candidates: [{product_id,product_name,category,description}]

      TASK:
      Score candidate alignment with user intent on a continuous scale:
      - Strong fit: 0.8-1.0
      - Moderate fit: 0.4-0.7
      - Weak fit: 0.0-0.3

      RULES:
      - Evaluate only the first 6 candidates by input order.
      - Keep exact product_id and product_name.
      - Return at most 6 objects in scored_candidates.
      - Preserve original candidate order in scored_candidates.
      - Include only keys requested below.
      - Use compact JSON formatting (no extra whitespace/newlines).
      - alignment_score must use one decimal place (for example: 0.8).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<the original query>",
        "cart_product_ids": ["<product id from cart>"],
        "candidates_received": <total input candidates>,
        "scored_candidates": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "category": "<item category>",
            "alignment_score": 0.0
          }
        ]
      }

  # -- Step 2b: User Understanding Agent (LLM, parallel with NLI) -------------
  user_understanding_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the user understanding stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from rag_retriever with user_query, cart_items, session_context, candidates.
      Use cart_items and session_context.browse_history for intent inference.
      Ignore price_range_viewed and any price-range fields if present.

      TASK:
      Infer concise user intent for downstream ranking.
      Keep user_intent grounded only in provided cart/session/candidate signals.
      Return max 2 items for style_preferences and max 2 for complementary_categories.

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<the original query>",
        "user_intent": "<one sentence summary of shopper intent>",
        "style_preferences": ["<pref1>", "<pref2>"],
        "complementary_categories": ["<category1>", "<category2>"]
      }

  # -- Step 3: Context Summary Agent (LLM) ------------------------------------
  context_summary_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the context synthesis stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from parallel_analysis with keys:
      - "nli_agent" (often a JSON string)
      - "user_understanding_agent" (often a JSON string)

      First parse both values as JSON objects.

      TASK:
      1) Copy user_intent from user_understanding_agent.user_intent.
      2) Build primary_candidates where alignment_score > 0.7 and product_id is not in cart_product_ids.
      3) Set after_alignment_filter = number of primary_candidates.
      4) If primary_candidates has fewer than 3 items, backfill with highest-scoring remaining non-cart candidates until reaching 3 (or exhaust candidates).
      5) Enforce diversity when possible, but do not reduce below 3 when 3+ non-cart candidates exist.
      6) Return at most 4 filtered candidates sorted by alignment_score descending.
      7) Keep only: product_id, product_name, category, alignment_score.

      Tie-break rule when alignment_score ties: preserve original candidate order.
      Output must be compact JSON (no markdown, no extra keys, no pretty-printing).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<from nli_agent.user_query>",
        "user_intent": "<from user_understanding_agent.user_intent>",
        "candidates_received": <from nli_agent.candidates_received>,
        "after_alignment_filter": <number>,
        "filtered_candidates": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "category": "<item category>",
            "alignment_score": 0.0
          }
        ]
      }

  # -- Step 4: Item Ranker Agent (LLM) ----------------------------------------
  item_ranker_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the final ranker stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from context_summary_agent with:
      - user_query
      - user_intent
      - candidates_received
      - after_alignment_filter
      - filtered_candidates

      TASK:
      - Rank up to 3 items from filtered_candidates.
      - If filtered_candidates has 3 or more items, return exactly 3 recommendations.
      - If fewer than 3 items exist, return all available items.
      - Prioritize: cross-sell fit > alignment_score > diversity.
      - Diversity rule: avoid duplicate categories when there are enough alternatives.
      - Use exact product_id and product_name from filtered_candidates.
      - Reasoning: one short sentence per item, maximum 12 words.

      Tie-break rule when candidates are equivalent: preserve input order.
      Output must be compact JSON (no markdown, no extra keys, no pretty-printing).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "recommendations": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "rank": 1,
            "reasoning": "short explanation"
          }
        ],
        "user_intent": "<from input user_intent>",
        "pipeline_trace": {
          "candidates_received": <from input candidates_received>,
          "after_alignment_filter": <from input after_alignment_filter>,
          "final_ranked": <number of returned recommendations>
        }
      }

      If there are no suitable recommendations, return:
      {
        "recommendations": [],
        "user_intent": "<from input user_intent>",
        "pipeline_trace": {
          "candidates_received": <from input candidates_received>,
          "after_alignment_filter": <from input after_alignment_filter>,
          "final_ranked": 0
        },
        "message": "No suitable cross-sell recommendations for current cart"
      }

  # -- Step 5: Deterministic output contract guard (non-semantic) -------------
  output_contract_guard:
    _type: output_contract_guard
    max_recommendations: 3
    description: "Validate and normalize final recommendation output contract"

  # -- Composed control flow ---------------------------------------------------
  parallel_analysis:
    _type: parallel_executor
    tool_list: [user_understanding_agent, nli_agent]
    description: "Run user understanding and NLI analysis in parallel"

# -- Main workflow: Sequential(RAG → Parallel → CSA → IRA → Guard) ------------
workflow:
  _type: sequential_executor
  verbose: true
  tool_list: [rag_retriever, parallel_analysis, context_summary_agent, item_ranker_agent, output_contract_guard]
  raise_type_incompatibility: false
  description: "ARAG: Agentic RAG for Personalized Recommendation"
